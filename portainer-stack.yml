version: "3.9"

services:
  gmweb:
    image: ghcr.io/OWNER/REPOSITORY:latest
    container_name: gmweb
    restart: unless-stopped
    ports:
      - "4173:4173"
    environment:
      SOCIETY_NAME: Golf Meadows
      GOOGLE_DRIVE_API_KEY: AIzaSyDummyKey...
      GOOGLE_DRIVE_FOLDER_URL: https://drive.google.com/drive/folders/1AbCdEfGhIjKlMnOpQrStUvWxYz
      GOOGLE_OAUTH_CLIENT_ID: dummy-client-id.apps.googleusercontent.com
      GOOGLE_OAUTH_CLIENT_SECRET: GOCSPX-dummy-secret...
      OAUTH_REDIRECT_URI: https://beta.golfmeadows.org/auth/callback
      FLASK_SECRET_KEY: super-secret-random-string
      SUPER_ADMIN_EMAIL: admin@golfmeadows.org
      DATABASE_PATH: /app/data/db/society.db
      UPLOADS_PATH: /app/data/uploads
    volumes:
      - /home/prakalp/docker/gmweb/data/db:/app/data/db
      - /home/prakalp/docker/gmweb/data/content:/app/data/uploads
