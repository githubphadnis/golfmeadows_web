version: "3.9"

services:
  gmweb:
    image: ghcr.io/OWNER/REPOSITORY:latest
    container_name: gmweb
    restart: unless-stopped
    ports:
      - "4173:4173"
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/db/society.db
      UPLOADS_PATH: /app/data/uploads
    volumes:
      - /home/prakalp/docker/gmweb/data/db:/app/data/db
      - /home/prakalp/docker/gmweb/data/content:/app/data/uploads
