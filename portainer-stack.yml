version: "3.9"

services:
  coop-portal:
    image: ghcr.io/OWNER/REPOSITORY:latest
    container_name: coop-portal
    restart: unless-stopped
    ports:
      - "4173:4173"
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/db/society.db
      UPLOADS_PATH: /app/data/uploads
    volumes:
      - /volume1/docker/gmwebsite/db:/app/data/db
      - /volume1/docker/gmwebsite/uploads:/app/data/uploads
