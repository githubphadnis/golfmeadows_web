version: "3.9"

services:
  coop-portal:
    build:
      context: .
      dockerfile: Dockerfile
    image: coop-portal:local
    container_name: coop-portal-local
    restart: unless-stopped
    ports:
      - "4273:4273"
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/db/society.db
      UPLOADS_PATH: /app/data/uploads
    volumes:
      - ./data/db:/app/data/db
      - ./data/uploads:/app/data/uploads
