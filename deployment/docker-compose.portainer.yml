version: "3.9"

services:
  golfmeadows:
    image: ${GHCR_IMAGE:-ghcr.io/githubphadnis/div/golfmeadows-web:latest}
    container_name: golfmeadows-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4173}:4173"
    environment:
      - GOLFMEADOWS_DATA_DIR=/data
      - TZ=${TZ:-Asia/Kolkata}
    volumes:
      - ${GOLFMEADOWS_DATA_DIR:-./data}:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4173/api/health', timeout=3)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
