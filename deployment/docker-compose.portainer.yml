version: "3.9"

services:
  golfmeadows:
    image: ${GHCR_IMAGE:-ghcr.io/githubphadnis/golfmeadows_web:latest}
    container_name: golfmeadows-portal
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4173}:4173"
    environment:
      - GOLFMEADOWS_DATA_DIR=/data
      - TZ=${TZ:-Asia/Kolkata}
      - GOLFMEADOWS_ADMIN_TOKEN=${GOLFMEADOWS_ADMIN_TOKEN:-replace-with-strong-token}
      - GOLFMEADOWS_CORS_ORIGINS=${GOLFMEADOWS_CORS_ORIGINS:-https://golfmeadows.example.com,https://admin.golfmeadows.example.com,http://127.0.0.1:4173,http://localhost:4173}
      - GOLFMEADOWS_GOOGLE_CLIENT_ID=${GOLFMEADOWS_GOOGLE_CLIENT_ID:-}
      - GOLFMEADOWS_ADMIN_GOOGLE_EMAILS=${GOLFMEADOWS_ADMIN_GOOGLE_EMAILS:-}
    volumes:
      - ${GOLFMEADOWS_DATA_DIR:-./data}:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4173/api/health', timeout=3)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
