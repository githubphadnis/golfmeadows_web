name: Build and Deploy

on:
  push:
    branches:
      - main
      - cursor/new-golfmeadows-website-9626
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        run: |
          set -euo pipefail
          if [ -n "${GHCR_PAT:-}" ]; then
            echo "${GHCR_PAT}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          else
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  trigger-portainer:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
    steps:
      - name: Trigger Portainer webhook
        run: |
          if [ -n "${PORTAINER_WEBHOOK_URL:-}" ]; then
            curl -fsSL -X POST "${PORTAINER_WEBHOOK_URL}"
          else
            echo "PORTAINER_WEBHOOK_URL not set; skipping webhook trigger."
          fi
