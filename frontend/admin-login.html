<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | GolfMeadows</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <h1><span class="brand-accent">Golf</span>Meadows Admin</h1>
        <p class="login-lead">Sign in with your society admin account.</p>
        <p id="login-status" class="helper-text" aria-live="polite"></p>
        <form id="admin-login-form" class="form-card">
          <div class="form-row">
            <label for="login-email">Email</label>
            <input
              id="login-email"
              name="email"
              type="email"
              autocomplete="username"
              required
            />
          </div>
          <div class="form-row">
            <label for="login-password">Password</label>
            <input
              id="login-password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>
          <button class="btn btn-primary" type="submit">Sign in</button>
        </form>
        <div class="login-actions">
          <a href="/">← Back to public site</a>
        </div>
      </div>
    </div>
    <script src="/admin-login.js"></script>
  </body>
</html>
