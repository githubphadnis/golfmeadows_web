<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ society_name }} Portal{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                500: "#0369a1",
                600: "#075985",
                700: "#0c4a6e",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a href="{{ url_for('index') }}" class="text-base font-semibold text-slate-900 sm:text-lg">{{ society_name }} Portal</a>
        <div class="flex items-center gap-3">
          <a href="{{ url_for('drive_documents_page') }}" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-50">Drive Documents</a>
          <a href="{{ url_for('admin_login') }}" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-50">Admin</a>
        </div>
      </div>
    </header>
    <main class="{% block main_class %}mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8{% endblock %}">
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
  </body>
</html>
