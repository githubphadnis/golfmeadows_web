<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ society_name }} Portal{% endblock %}</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net" />
    <link
      rel="preload"
      as="image"
      href="https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/envelope.svg"
      type="image/svg+xml"
    />
    <link
      rel="preload"
      as="image"
      href="https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/arrow-top-right-on-square.svg"
      type="image/svg+xml"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                500: "#0369a1",
                600: "#075985",
                700: "#0c4a6e",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-stone-100 text-stone-700 bg-cover bg-center bg-fixed" {% if global_background_style %}style="{{ global_background_style }}"{% endif %}>
    <div class="min-h-screen bg-[#F5F0EB]/90">
    <header class="border-b border-emerald-100 bg-white/95 backdrop-blur">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a href="{{ url_for('index') }}" class="text-base font-semibold text-stone-800 sm:text-lg">{{ society_name }} Portal</a>
        <div class="flex items-center gap-3">
          <a href="{{ url_for('index') }}" class="rounded-lg border border-stone-300 px-3 py-1.5 text-sm font-medium text-stone-700 hover:bg-stone-50">Home</a>
          <a href="{{ url_for('admin_login') }}" class="rounded-lg bg-indigo-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-indigo-500">Admin</a>
          <img src="{{ url_for('static', filename='logo.png') }}" alt="Society logo" class="h-10 w-auto rounded-md object-contain" />
        </div>
      </div>
    </header>
    <main class="{% block main_class %}max-w-7xl mx-auto px-4 sm:px-6 lg:px-8{% endblock %}">
      {% block content %}{% endblock %}
    </main>
    <footer class="mt-12 border-t border-stone-200 bg-white py-8">
      <div class="mx-auto max-w-7xl px-4 text-center text-sm text-stone-600 sm:px-6 lg:px-8">
        <p>Golf Meadows Cooperative Housing Society, Sector 21, Pune, Maharashtra 411045</p>
        <p class="mt-1">Contact: support@golfmeadows.example.com</p>
        <p class="mt-2">&copy; {{ current_year }} Golf Meadows</p>
      </div>
    </footer>
    {% block scripts %}{% endblock %}
    </div>
  </body>
</html>
