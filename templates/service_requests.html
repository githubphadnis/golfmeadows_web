{% extends "base.html" %}
{% block title %}Service Requests | {{ society_name }}{% endblock %}
{% block content %}
<section class="py-6">
  <div class="mb-6 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-stone-800">Service Requests</h1>
    <a href="{{ url_for('index') }}" class="rounded-lg border border-stone-300 px-3 py-1.5 text-sm font-medium text-stone-700 hover:bg-stone-50">← Back to Home</a>
  </div>

  <div class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
    {% for card in service_request_cards %}
    <article class="group relative h-56 overflow-hidden rounded-2xl shadow-md transition-all hover:-translate-y-1 hover:shadow-xl">
      <img src="{{ card.image_url }}" alt="{{ card.title }}" class="h-full w-full object-cover opacity-25" loading="lazy" />
      <div class="absolute inset-0 bg-gradient-to-t from-black/95 via-black/85 to-black/70"></div>
      <div class="absolute inset-x-0 bottom-0 z-10 p-4 text-white">
        <h2 class="text-lg font-semibold">{{ card.title }}</h2>
        <p class="mt-1 text-sm text-stone-100">{{ card.description }}</p>
        <div class="mt-3 flex items-center gap-2">
          <button
            type="button"
            class="email-action inline-flex items-center gap-2 rounded-lg bg-black/55 px-3 py-2 text-sm font-medium text-rose-50 backdrop-blur transition-colors hover:bg-rose-500/40"
            data-email-category="service_requests"
            data-email-subject="{{ society_name }} - {{ card.title }}"
            data-email-body="Hello, I need support for {{ card.title }}:"
            title="Open default mail client"
          >
            <img src="https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/envelope.svg" alt="" class="h-5 w-5" aria-hidden="true" />
            <span>Mail</span>
          </button>
          <button
            type="button"
            class="email-action inline-flex items-center gap-2 rounded-lg bg-black/55 px-3 py-2 text-sm font-medium text-orange-50 backdrop-blur transition-colors hover:bg-orange-500/40"
            data-email-category="service_requests"
            data-email-subject="{{ society_name }} - {{ card.title }}"
            data-email-body="Hello, I need support for {{ card.title }}:"
            data-email-mode="gmail"
            title="Open in Gmail"
          >
            <span class="inline-flex h-5 w-5 items-center justify-center rounded-full bg-orange-100 text-xs font-semibold text-orange-700">G</span>
            <span>Gmail</span>
          </button>
        </div>
      </div>
    </article>
    {% endfor %}
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock %}
