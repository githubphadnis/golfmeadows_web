
{% extends "base.html" %}
{% block title %}Admin Home | {{ society_name }}{% endblock %}
{% block content %}
<section class="space-y-6 py-4 sm:py-6">
  <div class="rounded-2xl bg-white p-4 shadow-sm ring-1 ring-slate-200 sm:p-6 md:p-8">
    <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
      <div>
        <h1 class="text-2xl font-bold text-stone-800">Admin Home</h1>
        <p class="text-sm text-slate-600">Choose a management category.</p>
      </div>
      <div class="flex gap-3">
        <a href="{{ url_for('index') }}" class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">View Portal</a>
        <form method="post" action="{{ url_for('logout') }}">
          <button class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700" type="submit">Logout</button>
        </form>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 gap-4 sm:gap-6 md:grid-cols-2 lg:grid-cols-3">
    {% for tile in tiles %}
    <a href="{{ tile.href }}" class="bg-white rounded-xl shadow-sm p-4 text-center cursor-pointer hover:shadow-md border border-stone-200 transition-all sm:p-6">
      <h2 class="text-base font-semibold text-stone-800 sm:text-lg">{{ tile.title }}</h2>
      <p class="mt-2 text-sm text-slate-600">{{ tile.description }}</p>
    </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
